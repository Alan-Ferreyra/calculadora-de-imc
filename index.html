<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de IMC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    
    <div class="page">
      <div class="banner">
        👋 Feito por Alan Ferreyra — 
        <a href="https://www.linkedin.com/in/alan-ferreyra/?locale=pt_BR">LinkedIn</a> · 
        <a href="https://github.com/Alan-Ferreyra">GitHub</a>
      </div>
      
      <div class="card">
        <div class="card-header">
          <div class="header-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
              <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/>
              <circle cx="20" cy="10" r="2"/>
            </svg>
          </div>
          <div>
            <h1>Calculadora de IMC</h1>
            <p class="subtitle">Índice de Massa Corporal</p>
          </div>
        </div>

        <form class="form" action="" method="get">

          <div class="form-section">
            <div class="input-group">
              <label for="peso">Peso</label>
              <div class="input-wrap">
                <input type="text" class="peso" id="peso" placeholder="0" />
                <span class="unit">kg</span>
              </div>
            </div>

            <div class="input-group">
              <label for="altura">Altura</label>
              <div class="input-wrap">
                <input type="text" class="altura" id="altura" placeholder="0.00" />
                <span class="unit">m</span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-calcular">Calcular IMC</button>

          <div class="resultado"></div>

        </form>

        <div class="divider"></div>

        <p class="table-label">Tabela de referência</p>
        <div class="ref-list">
          <div class="ref-item"><span class="ref-dot" style="background:#9BC1E6"></span><span class="ref-name">Abaixo do peso</span><span class="ref-range">menos de 18.5</span></div>
          <div class="ref-item"><span class="ref-dot" style="background:#97C459"></span><span class="ref-name">Peso normal</span><span class="ref-range">18.5 – 24.9</span></div>
          <div class="ref-item"><span class="ref-dot" style="background:#FAC775"></span><span class="ref-name">Sobrepeso</span><span class="ref-range">25.0 – 29.9</span></div>
          <div class="ref-item"><span class="ref-dot" style="background:#F09595"></span><span class="ref-name">Obesidade</span><span class="ref-range">30.0 – 34.9</span></div>
          <div class="ref-item"><span class="ref-dot" style="background:#F7C1C1"></span><span class="ref-name">Obesidade grave</span><span class="ref-range">35.0 – 39.9</span></div>
          <div class="ref-item"><span class="ref-dot" style="background:#FCEBEB"></span><span class="ref-name">Obesidade muito grave</span><span class="ref-range">40.0 ou mais</span></div>
        </div>

      </div>
    </div>
  </body>
</html>
